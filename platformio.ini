; =============================================================================
; CYD-GB: Game Boy Emulator for ESP32 Cheap Yellow Display
; Board: ESP32-2432S028R
; =============================================================================

[env:cyd]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.partitions = partitions.csv
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio

build_flags =
    -O2
    -DCORE_DEBUG_LEVEL=1
    -DUSER_SETUP_LOADED=1
    ; === ILI9341 TFT Display (HSPI) ===
    -DILI9341_2_DRIVER
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=13
    -DTFT_MISO=12
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=16000000
    -DUSE_HSPI_PORT
    ; === Fonts ===
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    ; === XPT2046 Touch (bit-bang, not used by TFT_eSPI) ===
    -DTOUCH_CS=33
    -DTOUCH_IRQ=36
    -DTOUCH_MOSI=32
    -DTOUCH_MISO=39
    -DTOUCH_CLK=25
    ; === SD Card (VSPI) ===
    -DSD_CS=5
    -DSD_MOSI=23
    -DSD_MISO=19
    -DSD_SCK=18
    ; === Emulator ===
    -DENABLE_LCD=1
    -DENABLE_SOUND=0
    -DPEANUT_GB_HIGH_LCD_ACCURACY=0
    -DPEANUT_GB_USE_DOUBLE_WIDTH_PALETTE=0

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git#v1.4
